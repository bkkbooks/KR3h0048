比千文中楷之沈分猶有古隸之意射碑與弔比干文相似馥書魏宣武帝御韓毅中楷大覺寺碑亦似沈馥而結體淳雅過之比丘道常小楷佛遺教經記唐徐嶠之師之中楷齊關亮造像趙文淵中楷河瀆碑唐中楷華嶽廟碑漸似隋徐陵字孝穆東海人中楷陵啓帖永興寺釋智永王徽之七世孫也住越州小楷法華經中楷歸田賦黃庭經刻千文收月儀千文木劉涇者佳薛道臨右軍告墓文星鳯樓佳至司隸大夫衡字玄卿河東汾隂人官史中楷隋平東碑禇登善師之陵中楷禹廟碑魏瑗小楷姑蘇上方寺舍利塔銘妙過歐率更化度碑元時失於盜後人補刻逺不逮古陳仁稜小楷阿彌陀經碑丁道護中楷隋興國寺啓法寺碑俱在襄張陽遒媚有法龍藏寺碑頗似虞永興公禮中楷隋釋智果智永之弟子也結體最精中楷心成頌論楷法唐人法帖歐陽詢字信本潭州臨湘人官至太子率更令渤海男楷書原於右軍而剛徑遒逸八法全備初學童子八九歲即習歐書爛熟稍長乃進於鍾王斯不墮於俗品矣小楷千文石揚休刻淳古類商周銘識唐代法書第一二王易學此帖未易到也小楷隂符經德離騷九歌論心經方朔畫像臨王右軍道經樂毅東周贊昵墓志羅隋姚辨墓志化度寺舍利中塔銘恭公碑亦歐書第一楷虞中楷九成宫醴泉銘辨學歐書必先之以醴泉恭公漸斂於姚又斂而隂符道德千文使信手寫出便與真本無異進於宣示樂毅如折枝之易其餘諸家風斯下矣小楷昭陵六馬贊清瘦類姚辨志菴慎收宋小楷金剛經在成都府修撰楊升中榻本古雅似樂毅論重之天聖中雷轟近楷薦福寺碑宋人極嘉靖間偶得唐榻木刻於饒州在虞恭公之次小楷荀氏漢書見米元章書史封奕事小楷衛靈公論二吳論御節中蘇原事俱宣和書譜類姚辨志彥博碑俱楷周大宗唐瑾碑右僕射溫中在西安府書假文振碑楷工部尚長吕令房定公中碑甘州刺史元長壽碑楷骨利獻馬贊在中鳯翔府山西林道場碑在吉安府楷隋廬以上中皆與虞恭公碑相似府類九成宫楷尹喜殿記在鳯翔中楷隋柱國皇甫誕碑在西安府二亦虞恭公之亞但頗露筋骨其間開闕字結體大過長非古法詹仲和以為少時筆近之蓋字道林之寺米元章以為寒儉無精采虞世傳刻失真之故也姚人官至禮部尚書永南字伯施明州餘興郡公諡文懿唐太宗師其楷法蓋本學右軍黃庭而加以溫厚秀潤余嘗評信本神品上上伯施神品上中知言者不以為謬歐陽小楷智永千文跋七十八字瀟灑雄秀永叔趙德父皆以為虞書第一誠然蓋信本小楷千文之次也中楷孔子廟堂碑曹士冕跋者不闕一字乃貞觀時所書精妙第一相王旦題者賊曌垂拱中翻刻鑿去第一行唐字字得宋榻亦不失真近時陜西重翻乃類沈度書落筆皆尖中肥腯俗甚蓋學虞者必先習知歐恭公碑定其骨格使八法全備斯為得之至國初陳壁滕權差為可取若危素沈度唯尚多肉骨法蕩然豈成書乎中楷周行軍總管羅剎碑在滑州碑在汾州昭仁寺小楷破邪論序亦清麗學黃庭然其中鬼谷作峪松木作㭉長松作萇寢息作寢不知六書有此謬筆所以不得與歐方駕也停雲館翻刻失真乃兩手所成尤無足取中楷千文宋榻石本佳不減廟堂木板甚謬大字攀龍鱗附鳯翼經一尺石刻在廣東傳殷令摹失真雖髣佛結體而筆勢粗俗道護名陳郡人官至𢎞文館學士師丁禇中楷益州長史裴鏡民碑中書令河南郡公遂良字登善錢塘人官至諌立賊曌貶潭州都督而卒書學右軍長於中楷小楷亦精較之歐虞則雄逸未逮也中楷太宗御製聖教序高宗聖教記二碑在西安府慈恩寺黃雲林以為用筆古徑類漢谷口甬銘信然稍大亦雄逸又二碑在同州字中楷至德觀孟法師碑中楷三龕碑在西安府漢書儒林傳贊玄梁國文昭公房齡碑古獨孤延壽碑聖教雅可愛龍門磨崖碑皆類小楷隂符經細如芝麻而結體廓落不窘有大字規矩石氏家刻甚精停雲亦可小楷道德經閻立本畫范文正公題石氏刻小楷度人經亦閻立本畫石氏刻宋榻佳停小雲失真經臨右軍楷黃庭小楷樂毅論亦臨右軍宣大洞內視隱文俱和書譜石研銘謝表文中楷太宗御製帝京篇十首字差小且過廋似儒林贊而景審南陽人太宗用為侍書小楷臨右軍黃庭經甚似趙摸與景審同時為侍書亦師右軍得法文湛小楷高士亷塋兆記中楷集右軍千薛純甘泉收真迹神妙蘇州刻失真有俗氣字純陀馮大字砥柱銘館與趙模同時承素直𢎞文張小楷臨右軍樂毅論為奉禮郎書師鍾元常欽元與景趙同時官小楷金剛經宣和書譜月道德經金石録筆小楷戎路表永叔考年斷非元常書然法淳古餘人不能及以金剛經較之知為欽元書矣盧藏用字子潛幽州人官至中書舍人大字建福寺在開封府魏華字文英山東人官為右庶子鄭文貞公徴之孫也得虞禇筆法中楷隴右節度使郭知運碑黃山谷盛稱其用筆之善中楷豫州刺史魏叔瑜碑瑊碑俱在西安府太子少傅竇希張柬之字孟將襄陽人官至中書令以復唐社稷功封漢陽郡王貶為瀧州司馬卒諡文貞歐中楷尹氏孝德記得歐禇之法判納言賊曌陽通率更令之子官至司禮郎殺之書宗乃父而露筋骨兼八分學之拓者中楷道因法師碑在西安府人鮮别少碑至今完盡得家風但微傷豐濃故有帖筆力徑健愧其父至于驚竒跳駿不避危險則無異也殷仲容令名子官至禮部郎中傳家學張懷瓘稱其大字尤善有驥騰鳯翥之勢小楷大興善寺舍利塔銘安府中楷流杯亭侍宴詩在西中楷虢王鳯碑在耀州開趙𢎞智碑大字汴州大業寺額在封府資聖寺額在鄴州府褒義門額在西安太僕寺額在河南府馬神觀額在靈州王勃字子安絳州人官至沛王幕府修撰省父福時于交址溺海卒中楷彌勒寺碑在湖州朱榻王子敬法後