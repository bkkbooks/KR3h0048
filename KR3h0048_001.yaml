body:
  text: 書訣明豐坊撰昔人傳筆訣云雙鈎懸腕讓左側右虛掌實指意前筆後論書勢云屋漏痕如壁坼如錐畫沙如印印泥如折叉股自鍾王以來知此祕者晉則謝安石郗方回庾稚恭張君祖宋則羊敬元薄欽叔齊則王簡穆伯寶梁則蕭景喬蕭挹陶𢎞景孫文韜陳則蔡徴毛喜陳伯智智永禪師隋則史陵薛道衡丁道護趙文淵唐則歐陽信本虞伯施禇登善薛純陀薛嗣通孫過庭鍾紹京賈膺福李泰和賀季真李太白張伯高杜子美顔清臣桞誠懸錢藏真張從申五代則楊凝式釋彥修趙宋則蔡君謨周子發先清敏公蘇子美黃魯直米元章黃長睿楊補之薑堯章金則趙周臣元則胡汲仲趙子昂仲穆巙子山宣伯絅薛宗海仇仁近黃晉卿傅汝礪俞伯貞曹世長陳叔夏饒爪之揭曼碩陳象賢葉敬常吳主一龍子高本朝唯宋景濓仲珩楊孟載王叔明端木孝思陶晉生陳文東曽子啓先曽祖通奉府君謝原功陳繼善袁德􅋮李貞伯陸子淵文徴仲祝希哲數公而已雖所就不一要之皆有師法非孟浪者古語云取法乎上僅得乎中取法乎中斯為下矣永宣之後人趨時尚於是效宋仲溫仲宋昌裔解縉紳沈民則薑伯振張汝弼李賓之陳公甫莊孔暘李獻吉何仲默金元玉詹仲和張君玉夏公謹王履吉者靡然成風古法無餘濁俗滿紙况於反賊李士實娼夫徐霖陳鶴之迹正如藍縷乞兒麻風遍體久墮溷厠蒲伏通衢擁腫蹣跚無復人狀具眼鼻者勇避千舍乃有師之如馬一龍方元渙等莊生所謂蝍且甘帶其此輩歟雙鈎懸腕者食指中指圓曲如鉤與拇指相齊而撮管於指尖則執筆挺直大字運上腕小字運下腕不使肉襯於紙則運筆如飛讓左側右者左肘讓而居外右手側而過中使筆管與鼻凖相對則行間直下而無欹曲之患虛掌實指者指不實則顫掣而無力掌不虗則窒礙而無勢妙在無名指得力三指齊撮於上而第四指抵管於下無垂不縮無往不收一畫之間變起伏於鋒杪一點之內齊衄挫於豪芒意前筆後者熟玩古帖於字形大小偃仰平直疏密纎穠藴藉於心臨紙瞑默豫思其法隨物賦形各得其理揚子云斷木為棋梡革為鞠亦皆有法况書居六藝之五聖人以之參贊化育貫徹古今明道先生執筆甚敬曰即此是學近時業舉白丁厚賂主司叨冒倫魁舐痔權幸驟躋膴仕乃謂書不足學也噫嘻彼何知彼何知無垂不縮無往不收則如屋漏痕言不露圭角也違而不犯和而不同𢃄燥方潤將濃遂枯則如壁拆言布置有自然之巧也指實臂懸筆有全力擫衄頓挫書必入木則如印印泥言方圓深厚而不輕浮也點必隱鋒波必三折肘下風生起止無迹則如錐畫沙言徑利峻拔而不凝滯也水墨得所血潤骨堅泯規矩於方圓遁鉤繩於曲直則如折叉股言嚴重渾厚而不為蛇蚓之態也古人論詩之妙必曰沈著痛快惟書亦然沈著而不痛快則肥濁而風韻不足痛快而不沈著則潦草而法度蕩然曽子曰士不可以不𢎞毅𢎞則曠達毅則嚴重嚴重則處事沈著可以託六尺之孤曠達則風度間雅可以寄百里之命兼之而後為全德臨大節而不可奪也薑白石云一須人品高此其本歟書有筋骨血肉筋生於腕腕能懸則筋􅀈相連而有勢指能實則骨體堅定而不弱血生於水肉生於墨水須新汲墨須新磨則燥濕調勻而肥瘦得所此古人所以必資乎器也硯之良者玄玉為最溫潤而發墨夏不渴水冬不冰其制如紹興貢硯高可三寸徑六寸廣三寸面為池溝勿蠟下為插手可時滌之亦可藏筆古硯神品曰殷比干墓磚周文王墓磚宣王墓磚齊桓公墓磚邢侯墓磚秦穆公墓磚衛靈公墓磚吳王闔閭墓磚秦始皇墓磚羽陽宫瓦漢未央宫磚瓦益延壽瓦陽朔磚楊伯起澄泥鳯臺硯銅雀臺磚瓦唐吕仙陶硯宋相州春波硯石硯神品曰葛仙翁嵒石出唐州方城縣溫州華嚴石端州下嵒青花子石北嵒石惠州紫金石洮河緑石萬州懸崖金星石歙溪龍尾舊坑青黑卵石婺源水船坑金紋石妙品者曰端溪中巖舊坑紫石龍尾鴈湖眉石金絲羅紋石金銀間刷絲石襄陽間玉瑪瑙石歸州緑石大沱石潭州斧山石夔州黟石西都會聖宫石淄州金雀石青州紅絲石溫州羅浮石大理點蒼山石取大徑尺許高四寸亦如紹興貢硯之制用作題署大字乃佳制墨之法陶煙㼧數百㼧上竅十許􅀈其內别為檠檠上為乳亦十許􅀈其檠乳各有竅如插花者乃取百年松臘析之若燈草雜沉水蘇合香投萆麻桐油漬之浹十旬插乳竅灼其端覆以㼧乃燔桑薪享麋角為膠乃取蚌胎之未成珠者及金箔龍腦和熱煙熱膠檀臼杵數萬乃為丸為餅為錠忌宿膠寒煤必半日而就見紹興廣見録磨墨之法重按輕推逺引近收每日晡時用蓮房滌去宿墨詰朝另磨則不滯筆亦以飬硯尖齊圓健筆之四德尖取毛之鋒齊擇毛之純不曲不析則圓中有長柱則健筆頭須長一寸二分以馬鬃或尾之細而鋭者為柱外用鼠鬚之淨者襯之再加八月兔豪之長者覆其上其人鬚及青羊毛黃狼尾鸂鶒翎鷴翎雉尾亦可以代兔豪之用然取毛必用象牙小梳梳去薉毛令其勻潔乃可制筆作小楷用蘭惢全堅管長一尺二寸玳瑁最良冬溫夏涼次則彌勒竹棕竹桃枝竹筆冒用伽南紫檀黃檀沈香則辟蟲篆分中楷行草用三妙筆湘妃竹雪竹紫竹豬腸竹人面竹鈸兒竹長一尺四寸書滑紙用剛豪峭紙用柔豪作題署大字用墨池烏木管長二尺其次一尺八寸其次一尺六寸執手處削細如三妙筆筆冒可用骰柏楠鸂鶒木癭木斑竹石灰水浸豬鬃滿百日令剛柔得所用為墨池張溫夫用羊鬚久則滯墨朱元晦用蒙草不久即秃皆不如豬鬃為正法也筆牀以白藤縛彌勒竹為之或作筆槊亦然加白檀底筆格靈壁石能收香徑四五寸自然起五峰者竒或灑墨玉依米元章硯山式碾作七峰亦妙秦漢銅螭柴汝官哥古窑小山亦可晉陟釐紙以海苔為之唐麻紙以􅀢染以檗為硬黃澄心堂以楮寶晉齋以台藤金粟以野繭髙麗亦然必加萬杵之功斯為全美古人作篆分真行草書用筆無二必以正鋒為主間用側鋒取妍分書以下正鋒居八側鋒居二篆則一毫不可側也詳辨於後古大家之書必通篆籀然後結構淳古使轉徑逸伯喈以下皆然米元章稱謝安石中郎帖顔魯公爭坐書有篆籀氣象乃其證也然篆學必精六書六書之説唯趙古則本義卷首諧聲假借轉注三論足以一掃諸家之謬但以小篆為主不能深考古文譬則無根之木無首之人如為古文天字庖羲始制而以一大會意象形而以為形兼意從口指事而以為事兼聲象簞形而以為從卑乃巵匜象形而以為女陰皆失倉頡本旨蓋小篆者李斯以愚黔首豈可反以為據乎楊桓六書統最博然承許慎之訛以會意為轉注轉注為假借又不逮古則逺矣余著書海􅑴厡極博而精苐知者鮮耳篆有百種宜常用者六種而已一曰古文史皇倉頡廣天皇之制二曰竒字黃帝史沮誦增損古文三曰大篆周公命史佚同天下之文三體宜書針銘可以出入四曰小篆李斯制碑額志蓋齋扁用之五曰繆篆漢晉印章之文圖書私印宜其體六曰疊篆今官府印信所用禮部鑄印局所掌亦宜習知以防詐偽其唐元序夢英陳摶道肯所傳杜撰非古不必遍習也古文見宣和博古圖呂與叔考古圖李伯時甲秀堂帖鄭漁仲泉譜趙明誠古器物銘胡世將資古録薛用敏鍾鼎欵識王子辨嘯堂集古録王子端雪溪堂帖曹貞素欵識續録兹拔其尤著於左三皇器銘太昊金神農金棘幣文布葛天幣黃帝貨尊盧幣五帝器銘辛侯鼎帝嚳之父祀神宗鼎虞尊神宗祀文祖鼎匕虞帝子鼎后卨書鬲陶書象尊郫侯書龍觚訥言書夔鼎典樂書夏器銘大帝受禪告五嶽玉册文子昭明夾鍾商侯書子卨之商器銘庚鼎寶卣伯申鼎祖已甗父乙鼎父已甗寶彝鼎世母辛卣文祖以上頗與竒字相出入周器銘齊侯十三鍾宫齊侯鏄伯晉薑鼎微欒鼎南中鼎碩父鼎伯姬鼎公緘鼎叔旦敦牧敦師師望敦師宰辟父敦薑尢敦虢􅌏敦􅼩敦􅧟敦孟敦薑敦師毛父敦簠寅簋敔敦叔嚴敦卭弡中四簠侯釐仲魯正槃仲槃齊槃齊豆徒卣伯克尊以乙伯尊古高克尊相樂大司仲丂壺上皆純與大篆出入召父彞與伯映彞出司空彞匜五銘竒字相入杞公匜孟薑秦器銘恭公盄和鐘受昭襄王詛楚文昌始皇璽文曰天之命皇帝壽漢器銘鮑氏鼎孫長宜子孫洗長宜子鑑蜀嘉王鑑鐵谷口甬本小篆而行筆遒徑結體不拘猶有周器之風漢石經魯詩子周易春秋夏傳尚書孝經周禮老子儀禮漢石刻曹喜字仲則扶風人所書高祖大風歌有劒拔弩張之勢在徐州魏石經毛詩㵧左傳淑禮記淄爾雅學論語壁三墳書石邯鄲字子為臨侯文摹孔古文刻唐石經衛宏書論語孟子韓文公稱之賀拔基書孝經亦文公所取宋人書徐鉉字鼎臣廣陵人初仕南唐入宋為散騎常侍千文藏王濟家夏竦字子喬德安人官至樞密使集古篆韻最備黃伯思字長睿邵武人官至祕書郎書隂符經米芾字元章襄陽人官至知淮陽軍書周官經薛尚功字用敏錢塘人官至江州倅書消災顔心經字千文吳人官至朝列大夫書集古篆直之方叔韻藏米芾家元人書吾衍字子行號竹房亦曰貞居太末人臨詛楚文筆力俊逸釋北䇢蒙古人書韻海筆法精妙大明人書徐蘭字芳逺號南塘鄞人續古篆韻亦遒徑經朱雲字時望無錫人書隂符經道德經清靜陸得薛用敏筆法西烏程人書出師表北山移如字玉如號闐張文得晉薑鼎弡巾簠筆法汝茂號玉津俱錢和字太和號平山劉林字唐人臨魯詩不失真竒字竒讀如畸零之畸謂古文之别出者蓋古文簡而質竒字繁而巧黃雲林以此辨之若夫六藝之備則楊武子釋之最詳三皇時刻北海石室字在史皇墓上鄭樵以為倉頡書謬甚蓋地皇之世沮誦所刻王著摘上天命皇辟作王等二十字于閣帖亦贋物也五帝器銘鳥篆戈乃少昊時鳯鳥氏所制非商器也滕公墓銘路史以為顓頊諸侯卦象卣帝嚳子邰侯度字去爭后稷之父也虎方彛虞時朱虎制叨叨鼎亦虞器嬴益字伯翳臯陶之子有虞時為虞官後相夏后啓封梁公益鼎正虞時物宣和以為周器非也夏器銘大帝鉤帶銘喙一字曰禹昭明蛟篆壺曰月商侯名紀功鍾后啓鑄少康蛟篆戈商器銘成湯子父癸鼎辛未父癸尊子孫父癸鼎父癸匜執刀父癸尊執干父癸卣執戈父癸卣尊癸爵舉册父癸卣父癸爵太丁龍爵父乙甗外丙子虎父乙三爵父乙彝仲丁亥父乙尊乙非子孫父乙鼎象形父乙爵壬蜼尊父彝父乙卣太亞父乙觚甲祖乙爵兄丁尊父丁尊丙甗雙弓角阿執匕父丁卣衡尹卣執爵父丁卣沃丁父甲彞小甲父庚爵甲子觚父庚觚立戈鼎立戈觶太戊濟南二鼎曰冏中宗名也伊陟伊彝戊鼎仲丁甚父戊尊卣外士兕爵兕河亶甲册卣祖乙父壬爵子父壬爵乙毛鼎祖辛子高彝爵祖乙卣盤祖丁舉父辛父辛陽甲古父丁彞小乙守父丁爵高宗綦父乙奕車觚祖庚車爵祖甲招父丁爵鼎帝乙子孫父丁箕子箕鼎紂辛爵膠鬲鬲甗辛觶武庚子父父辛觶周器銘武王封比干銅槃管叔鮮鼎微子啓匜斝父乙甗微仲子乙蘇公司冦匜觶弗父何父貝宋戴公兕敦鼎魯僖公文王杞文公夫人文姬匜單穆公單旗雞彝秦器銘李斯字通古上蔡人傳國璽曰受命于天既壽永昌有魚鳥之狀蓋斯倣夏雕戈而稍加整齊漢以後人無能及之者宋器銘徽宗道君皇帝趙佶一圓璽曰天水乃蛟篆又篆方璽亦然曹士冕字端可一私印曰昌谷魚鳥宋石刻陳摶字圖南亳州人百福百壽亦有可觀在岣劉跂字斯立臨夏大帝玉册文變大刻石嶁山大篆結體本於古文而垂筆圓齊蓋小篆之所從出史逸字孟佚伯邑考之子文王之嫡長孫也逸生頙頙生黎黎生籀世以大宗為周太史籀又損益潤色别號籀文垂筆銛利以此為别周器銘彞二一雷雲一雷文皆曰作寶彝史逸大篆也虞叔夜鼎周有八士叔夜居五王季庶子為周官朱熹不考國語妄云成王時人或曰宣王時人白丁可笑史頉父鼎第四子也作姬原母敦應侯武王畢公名高文王庶子作叔高父簋史黎簠宋平公子姓名成䪫鍾六銘齊侯盤以上皆大篆伯克尊盤樂司徒卣魯正叔孟薑敦伯庶父敦孺肇父敦􅭻敦杜鋪伯玉盉辨以上用籀文與大篆毫釐之異非精博未易也周石刻成王大搜於岐陽左傳有明證史佚作詩十章刻之石鼓周公已薨未奏於樂韋應物以為文王則不當稱天子韓退之以為宣王宣搜乃在東都唯董彥逺尤延之得之鄭樵因在秦地執為秦物尤謬狁刻壇山曰吉日癸巳乃史籀書穆王北征獫李斯本之以制小篆曰烏乎有吳君子止之六先師孔子題季札墓字亦大篆視石鼓差小王深寧云孔世譜魯哀公使宰我聘於越越王勾踐問孔子宰我具言其聖是時夫子在陳勾踐因使宰我聘之夫子行至延陵聞殺大夫種遂題札墓而返乎夷儀唐殷仲容妄加延陵之墓四字效漢人方篆大徑尺非夫子之舊也秦石刻之罘大篆李斯書宋宣獻公綬刻於賜書堂漢石刻司馬門字摹於汝帖摹孔氏墳壇刻雪溪堂吳石刻皇象字休明廣陵人金陵三假石乃象籀文筆力雄逸但肩方有似八分非古也蘇建宜興人國山文為建大篆唐石刻陳惟玉為李撰等書碧落天尊碑李少溫師之姿媚有餘而淳古不足李陽氷字少溫趙郡人官至將作少監謙卦少作媚而傷細般若臺銘雄偉傷肥宋石刻薛用敏臨石鼓逼真在用敏之上遊師雄臨石鼓元石刻趙孟俯字于昂吳興人書大道歌古雅老子襲常章少筆嫩吾子行臨石鼓優入神品大明人書周伯琦字伯溫鄱陽人書車工吉日常武江漢四詩髣佛石鼓宋璲字仲珩金華人虞山丹井銘學趙子昻尚書喬宇字希大太原人號白巖官至少保吏部遊北嶽詩接武石鼓超出碧落之上雷斧雷輪圖詠大篆尤雄偉吳奕字嗣業長洲人文定公寬之子官至中書舍人臨石鼓妙林應龍字祥之永嘉人臨石鼓木刻失真不逮嗣業小篆一名玉筯篆吾子行曰李斯方圓廓落陽氷圓活姿媚然兼之者亦唯子行一人可謂獨步千古陶宗儀乃云專法陽氷淺之知篆矣餘家亦有妙處並詳於左秦石刻李斯泰山碑并二世詔渾厚淳古有石鼓之風斯書第一嶧山碑得壇山筆意唯鄭文寶跋本最真次則賜書堂遺字亦妙西安府學失之板應天府學傷於弱去真逺矣亞琅邪臺刻嶧山之會稽山碑琅邪之亞秦器銘羽陽宫磬亦斯書雄逸堂刻權斤不逮量漢器宗之量斯書最小而精雪溪漢器銘慱山爐武帝時物鑄上林鼎篆丞相忠武侯陽蜀鼎三皆昭烈時一銘小都諸葛亮孔明書唐石刻李陽氷琅邪新鑿泉題得羽陽宫磬筆勢庶子泉銘結體可亞會稽山碑滑州新驛記泉銘之次李千文驛記之次次隂符經千文之次上大夫書隂符之三英孝英記熟結體不古怡亭記孝德訓皆運筆雖處州文宣王廟記時縉雲黃帝祠記法城隍神廟記皆少書纎弱不足取明州刺史裴公碣局促軟弱無氣無骨薉濁俗惡尤可憎惡乃篆品之最下下者亦題陽氷恐贋筆也赤松宫赤松山北山鼎湖黃帝祠宇縣縉雲縉雲縣學般若臺天清地寧俱少溫大篆齋扁可法衛包華嶽禪堂修飾記李庚浯溪銘浯臺銘右二人皆少溫之流不得李斯融匾之法亦熟於姿媚至文雅夢英輩尤俗惡可惡五代石刻郭忠恕字恕先雒陽人仕周為國子博士文宣王廟記類少溫三英記隂符經不佳徐鼎臣宓子賤碑器喬公亭記井銘大道不賦蟬賦許真人丹徐鍇字楚金南唐內史鼎臣之弟玉晨觀貞素先生碑紫極宫玉磬銘兄弟皆學李斯得其法宋石刻鄭文寶江右人官至工部郎中徐鼎臣弟子也小篆千文精妙劉斯立泰山篆譜字雖縮小而不失李斯筆意張有字謙中吳人隱於黃冠伯夷頌嚴先生祠堂記師李斯渾厚純古得泰山之罘之法葛剛正千文吾子行稱之南仲張次立胡恢等國子監石經乃章友直楊書宋硯銘文天祥字履善吉水人號文山官至少保右丞相信國公大明追諡忠烈王帶生銘筆法清徑宋人書句中正字德元益州華陽人官至屯田郎李無惑同安人官至贊善大夫查道字湛然休寧人官至右司郎中非章友直王壽卿字魯翁陳留人黃魯直稱其文所及安國官太官丞蘇子瞻贊其有石鼓泰勛字趙山之風霆趙子晝字叔問宋宗室宋杞張有弟子徐兢字明叔李昭字晉傑汪藻字彥章魏克愚元人書吾子行隂符經逺遊樂毅論千文賦招雨師文思玄出師表九歌論徙戎歸去來辭吟桃源記行北山移文議大鵬賦夢遊天姥渼陂贈韓諫注李潮八分小篆歌刻進學解神盤谷序石鼓歌真迹石皆優入品趙子昂李太白寶公像贊雄秀類鼎臣井銘少溫論篆書小字精趙雍字仲穆子昂之子尤長於齋扁謙中虞針周伯琦字伯溫鄱陽人師徐明叔張逍遙遊螢火賦弟子則序惜逝壁招隱定歸田賦愚溪詩赤賦性書西銘臨謙中嚴先生祠堂記吳福孫字子善錢塘人四氣調神大論得竹房松雪筆意陶九成以私意毁之非公論章弼字共辰松江人師子昂應在字止善句章人陳繹曽字伯敷吳興人余襄鄱陽人齋扁尤佳王翼字元徴金壇人書四書行於世吳炳字彥炳汴人蔣冕字文卿師伯溫小字千文精妙鄭文寶不是過張􅋒字公辨保定人淳古可取趙期頥字子竒汴人陸友字友仁平江人盧熊字公武昆山人吳睿字孟思錢塘人夾合希賢蒙古人小篆清徑同時泰不華熟而無骨非希賢之比大明人書董倫字安常河南人周仲薿伯溫弟周宗仁字克復伯溫子號介軒師二徐張謙中陶復初字明本天台人繆貞字仲素姑蘇人師謙中同知永樂初不仕陳壁字文東松江人官解州年八十餘弟子沈度